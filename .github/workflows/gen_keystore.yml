name: Generate Keystore Base64
on: workflow_dispatch # 手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore File
        run: |
          # 生成一个名为 my-release.keystore 的证书
          keytool -genkey -v -keystore my-release.keystore \
            -alias my-key-alias -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass my-password -keypass my-password \
            -dname "CN=MyName, OU=Dev, O=MyOrg, L=City, S=State, C=CN"
          
          echo "-------------------------------------------------------"
          echo "你的 ALIAS 是: my-key-alias"
          echo "你的 PASSWORD 是: my-password"
          echo "-------------------------------------------------------"
          echo "以下是你的 Base64 编码 (复制下方长字符串):"
          echo ""
          base64 -w 0 my-release.keystore
          echo ""
          echo "-------------------------------------------------------"
